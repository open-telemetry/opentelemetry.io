<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 862 290" role="img" aria-labelledby="t d" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="t">Consuming OpenTelemetry entity events: a pipeline</title>
  <desc id="d">OpenTelemetry producers emit entity events over OTLP into a durable, event-sourced log. A projection replays the log into a live, bi-temporal entity graph, exposed through a GraphQL API for humans and tools and an MCP server for an AI assistant.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8a93a3"/>
    </marker>
  </defs>

  <!-- edges -->
  <g fill="none" stroke="#8a93a3" stroke-width="1.6" marker-end="url(#arrow)">
    <line x1="164" y1="145" x2="288" y2="145"/>
    <line x1="442" y1="145" x2="504" y2="145"/>
    <line x1="658" y1="138" x2="698" y2="96"/>
    <line x1="658" y1="152" x2="698" y2="200"/>
  </g>
  <g fill="#5b6472" font-size="10.5" text-anchor="middle">
    <text x="226" y="137">OTLP entity events</text>
    <text x="473" y="137">replay</text>
  </g>

  <!-- boxes -->
  <g fill="#ffffff" stroke="#5b6472" stroke-width="1.5">
    <rect x="12" y="112" width="152" height="66" rx="8"/>
    <rect x="292" y="112" width="150" height="66" rx="8"/>
    <rect x="508" y="112" width="150" height="66" rx="8"/>
    <rect x="700" y="58" width="150" height="58" rx="8"/>
    <rect x="700" y="174" width="150" height="58" rx="8"/>
  </g>

  <!-- titles -->
  <g fill="#1f2630" font-size="13" font-weight="600" text-anchor="middle">
    <text x="88" y="141">OTel producers</text>
    <text x="367" y="141">Durable event log</text>
    <text x="583" y="141">Live entity graph</text>
    <text x="775" y="84">GraphQL API</text>
    <text x="775" y="200">MCP server</text>
  </g>
  <!-- subtitles -->
  <g fill="#5b6472" font-size="10" text-anchor="middle">
    <text x="88" y="159">host / network agents</text>
    <text x="367" y="159">event-sourced</text>
    <text x="583" y="159">bi-temporal</text>
    <text x="775" y="101">humans · dashboards · tools</text>
    <text x="775" y="217">your AI assistant</text>
  </g>
</svg>
