# Community

community_introduce: >-
  {{ .Site.Title }} це проєкт з відкритим вихідним кодом, який кожен член
  спільноти може використовувати, вдосконалювати та насолоджуватися ним. Ми
  будемо раді, якщо ви приєднаєтеся до нас!

community_contribute: >-
  Щоб дізнатися, як зробити внесок до документації {{ .Site.Title }}, див.
  [Внесок](/docs/contributing/). Інші корисні посилання:

