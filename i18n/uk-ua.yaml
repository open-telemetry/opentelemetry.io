# Search AI
ui_search_ai_modal_title: AI-асистент OpenTelemetry

ui_search_ai_modal_disclaimer: >-
  Ця **експериментальна функція** використовує AI для відповідей на запитання на
  основі документації сайту, GitHub OpenTelemetry, Stack Overflow та інших
  ресурсів. AI не завжди може надавати точну або релевантну інформацію.
  Поділіться своїми думками, надавши
  [відгук](https://github.com/open-telemetry/opentelemetry.io/discussions/6802).
