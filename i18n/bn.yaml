# Search AI
ui_search_ai_modal_title: OpenTelemetry-র AI সহকারী

ui_search_ai_modal_disclaimer: >-
  এই **পরীক্ষামূলক ফিচারটি** সাইটের ডকুমেন্টেশন, OpenTelemetry GitHub, Stack
  Overflow, এবং অন্যান্য সংস্থানের উপর ভিত্তি করে প্রশ্নের উত্তর দিতে AI ব্যবহার
  করে। AI সবসময় সঠিক বা প্রাসঙ্গিক তথ্য প্রদান নাও করতে পারে।
  [প্রতিক্রিয়া](https://github.com/open-telemetry/opentelemetry.io/discussions/6802)
  প্রদান করে আপনার মতামত জানান।
