[build]
publish = "public"
command = "npm run netlify-build:preview"

[context.production]
command = "npm run netlify-build:production"

[[redirects]]
from = "https://docs.opentelemetry.io/*"
to = "https://opentelemetry.io/docs/:splat"
force = true

[[redirects]]
from = "https://blog.opentelemetry.io/*"
to = "https://opentelemetry.io/blog/:splat"
force = true

# Runs before schema-analytics: serves prebuilt `index.md` when Accept prefers
# text/markdown; otherwise forwards via context.next().
[[edge_functions]]
function = "markdown-negotiation"
path = "/*"

[[edge_functions]]
function = "schema-analytics"
path = "/schemas/*"

# Note: the schema-analytics Edge Function also sets this content-type for
# /schemas/* 2xx responses, since Netlify custom headers don't reliably apply
# once an Edge Function handles the route. This rule is kept as a fallback in
# case the Edge Function is removed.
[[headers]]
  for = "/schemas/:version"
  [headers.values]
    content-type = "application/yaml"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "frame-ancestors 'self';"
