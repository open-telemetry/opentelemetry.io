name: Links

# cSpell:ignore minisearch lycheecache lycheeverse
on:
  merge_group:
  pull_request:

permissions:
  contents: read

jobs:
  # Build site first because lychee checks the generated HTML files
  build:
    name: BUILD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }

      - name: Create NPM cache-hash input file
        run: |
          mkdir -p tmp
          jq '{devDependencies, dependencies, engines, gitHubActionCacheKey}' package.json > tmp/package-ci.json

      - name: Create and use reduced-dependencies package.json
        run: |
          jq '.devDependencies |= with_entries(
                  select(.key | test("prefix|hugo|css|js-yaml"))
                )
                | .dependencies |= with_entries(
                  select(.key | test("minisearch")))
                | del(.optionalDependencies)' \
            package.json > tmp/package-min.json
          cp tmp/package-min.json package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: tmp/package-ci.json

      - run: |
          npm install --omit=optional
          git restore package.json

      - name: Git submodules properly pinned?
        run: |
          npm run seq pin:submodule
          echo "If the diff check below fails, then update .gitmodules by pinning the named git"
          echo "submodule(s); or undo the submodule update(s) if it happened by mistake."
          npm run _diff:fail

      - name: Build the site
        run: npm run log:build
        continue-on-error: true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-artifacts
          path: |
            public/
            tmp/build-log.txt
            tmp/package*.json

  check-links:
    name: CHECK LINKS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: build-artifacts }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: tmp/package-ci.json

      - name: Create and use reduced-dependencies package.json
        run: |
          jq '.devDependencies |= with_entries(
                  select(.key | test("js-yaml|link-cache"))
                )
                | del(.dependencies, .optionalDependencies)' \
            package.json > tmp/package-min-links.json
          cp tmp/package-min-links.json package.json

      - run: |
          npm install --omit=optional --ignore-scripts
          git restore package.json

      # Run the lychee-binary tests for real here; the general test job only
      # has the sources, so it skips them.
      - uses: ./.github/actions/install-lychee
      - name: Lychee sanity tests
        run: npm run test:local-tools:lychee

      - run: npm run generate:config:links

      - name: Check links
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          npm run _check:links 2>&1 | tee lychee-out.txt

      - name: All checked links are in the cache?
        run: |
          echo "If the diff check below fails, run 'npm run check:links' and commit the"
          echo "updated .lycheecache."
          git diff --exit-code -- .lycheecache

      - name: Lychee summary
        if: always()
        run: |
          {
            echo '## Lychee link check'
            echo
            echo '```text'
            tail -n 40 lychee-out.txt 2>/dev/null || echo '(no lychee output captured)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  check-build-log-for-issues:
    name: WARNINGS in build log?
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: build-artifacts }
      - run: cat tmp/build-log.txt
      - run: scripts/check-build-log.sh

  test-public:
    name: TEST (built-site · public)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: build-artifacts }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - run: npm run test:public
