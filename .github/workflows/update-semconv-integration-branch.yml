name: Update semconv integration branch

on:
  schedule:
    # daily at 10:24 UTC
    - cron: '24 10 * * *'
  workflow_dispatch:

permissions:
  contents: read
  # Needed so the "Pick integration branch" step can open a tracking issue
  # via gh when it detects problems (e.g. stale integration branches).
  issues: write

env:
  REPO: semantic-conventions
  # Abbreviation of REPO used in branch and submodule names
  ABBR: semconv

jobs:
  update-semconv-integration-branch:
    runs-on: ubuntu-latest
    if: github.repository == 'open-telemetry/opentelemetry.io'
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: otelbot-token
        with:
          # the higher privileged docs token is needed to push commits to an existing PR
          client-id: ${{ vars.OTELBOT_DOCS_APP_ID }}
          private-key: ${{ secrets.OTELBOT_DOCS_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # this is needed to do the rebase below
          fetch-depth: 0
          # this is needed to trigger workflows when pushing new commits to an existing PR
          token: ${{ steps.otelbot-token.outputs.token }}

      - name: Pick integration branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/gh/specs/pick-branch/cli.mjs --spec semconv

      - name: Checkout or create branch
        run: |
          if ! git ls-remote --exit-code --heads origin $BRANCH; then
            git checkout -b $BRANCH origin/main
            git push -u origin $BRANCH
          else
            git checkout $BRANCH
          fi

      - name: Use CLA approved github bot
        run: |
          git config user.name otelbot
          git config user.email 197425009+otelbot@users.noreply.github.com

      - name: Merge from main
        run: |
          previous=$(git rev-parse HEAD)
          git fetch origin
          git merge origin/main
          if [ "$(git rev-parse HEAD)" != "$previous" ]; then
            git push
          fi

      - name: Update submodule and Hugo mounts
        run: |
          git submodule update --init content-modules/${{ env.REPO }}
          cd content-modules/${{ env.REPO }}

          if git ls-remote --exit-code --tags origin $VERSION; then
            git reset --hard $VERSION
            tag_exists=true
          else
            git reset --hard origin/main
          fi

          commit_desc=$(git describe --tags)
          cd ../..

          sed -i "s/^\t${{ env.ABBR }}-pin = .*/\t${{ env.ABBR }}-pin = $commit_desc/" .gitmodules

          if [ "$tag_exists" == "true" ]; then
            sed -i "s/^\(\s *\)${{ env.ABBR }}: .*/\1${{ env.ABBR }}: ${commit_desc#v}/" scripts/content-modules/adjust-pages.pl
          fi

          ./scripts/update-semconv-mounts.pl

          git add -A

          if ! git diff-index --quiet --cached HEAD; then
            git commit -am "Update ${{ env.ABBR }} submodule to $commit_desc"
            git push
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Update refcache
        run: |
          npm install --omit=optional
          # Ignore link-check failures so we can still commit refcache updates
          npm run fix:refcache || true
          # Prune 404 entries, if any
          npm run _refcache:prune

          git add -A

          if ! git diff-index --quiet --cached HEAD; then
            git commit -am "Update refcache"
            git push
          fi

      - name: Create or finalize pull request
        env:
          # not using secrets.GITHUB_TOKEN since pull requests from that token do not run workflows
          GH_TOKEN: ${{ steps.otelbot-token.outputs.token }}
        run: scripts/gh/specs/create-or-finalize-pr.mjs --spec semconv

  report-failure:
    needs: update-semconv-integration-branch
    if: failure() && github.repository == 'open-telemetry/opentelemetry.io'
    uses: ./.github/workflows/reusable-report-failure.yml
    permissions:
      issues: write # Pass through for failure tracking issues
      contents: read
