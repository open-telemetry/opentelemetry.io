name: Sync Collector component docs (fork)

on:
  workflow_dispatch:

# Declare default permissions as read only.
permissions: read-all

jobs:
  sync-collector-docs-fork:
    name: Sync Collector component documentation (fork testing)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    # Only run on forks, not official repo
    if: github.repository != 'open-telemetry/opentelemetry.io'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for git operations

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Configure git
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Sync collector documentation
        run: bash .github/scripts/collector-sync.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_OWNER: ${{ github.repository_owner }}
          PR_BASE_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
