name: Files

on:
  merge_group:
  pull_request:

permissions:
  contents: read

jobs:
  check-expired:
    name: EXPIRED FILE check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - run: npm run check:expired
      - run: npm run _diff:fail

  check-filenames:
    name: FILENAME check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      # Validate the checker itself before trusting its verdict.
      - run: node --test 'scripts/validate/filenames/*.test.mjs'
      - run: npm run check:filenames

  check-formatting:
    name: FILE FORMAT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - run: npm run check:format

  check-codeowners:
    name: CODEOWNERS check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      # Only dependency of the check; skip the full (slow) npm install.
      - run: npm install --no-save --ignore-scripts js-yaml
      - run: npm run check:codeowners

  check-branch-name:
    name: BRANCH NAME check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - uses: ./.github/actions/fail-if-branch-is-main
