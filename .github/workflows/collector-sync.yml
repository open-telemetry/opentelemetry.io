name: Sync Collector component docs

on:
  workflow_dispatch:
  schedule:
    # At 03:00 UTC, every day
    - cron: 0 3 * * *

# Declare default permissions as read only.
permissions: read-all

jobs:
  sync-collector-docs:
    name: Sync Collector component documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    # Only run on official repo, not forks
    if: github.repository == 'open-telemetry/opentelemetry.io'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Use CLA approved github bot
        run: |
          git config user.name otelbot
          git config user.email 197425009+otelbot@users.noreply.github.com

      - name: Create otelbot GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: otelbot-token
        with:
          client-id: ${{ vars.OTELBOT_DOCS_CLIENT_ID }}
          private-key: ${{ secrets.OTELBOT_DOCS_PRIVATE_KEY }}

      - name: Sync collector documentation
        run: bash .github/scripts/collector-sync.sh
        env:
          GH_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          GITHUB_REPOSITORY: open-telemetry/opentelemetry.io
