name: Survey on Merged PR by Non-Member

on:
  # zizmor: ignore[dangerous-triggers] — this workflow only calls the reusable shared workflow; no PR code is checked out or executed.
  pull_request_target:
    types: [closed]
    branches: [main]

permissions: {}

jobs:
  survey:
    uses: open-telemetry/shared-workflows/.github/workflows/survey-on-merged-pr.yml@7c49790392da7de86fdb4bb968446f9cb8461eb8 # v0.3.1
    with:
      client_id: ${{ vars.OTELBOT_CLIENT_ID }}
    secrets:
      private_key: ${{ secrets.OTELBOT_PRIVATE_KEY }}
