name: Lint shell scripts

on:
  pull_request:
    paths:
      - '.github/scripts/**'
      - '.shellcheckrc'

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Run ShellCheck on changed scripts
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          rc_changed=$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" \
            -- '.shellcheckrc' || true)
          if [[ -n "${rc_changed}" ]]; then
            echo ".shellcheckrc changed; checking all scripts."
            changed_scripts=$(find .github/scripts -type f -name '*.sh' || true)
          else
            changed_scripts=$(git diff --name-only --diff-filter=ACMR \
              "${BASE_SHA}" "${HEAD_SHA}" \
              -- '.github/scripts/*.sh' || true)
          fi
          if [[ -z "${changed_scripts}" ]]; then
            echo "No shell scripts to check."
            exit 0
          fi
          echo "Checking: ${changed_scripts}"
          # shellcheck disable=SC2086 # Intentional word-splitting on file list
          shellcheck -x ${changed_scripts}
