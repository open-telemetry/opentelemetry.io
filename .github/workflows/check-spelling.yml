name: Spelling

on:
  merge_group:
  pull_request:

permissions:
  contents: read

jobs:
  spelling-check:
    name: SPELLING check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - run: npm run _install:cspell --ignore-scripts
      - run: npm run check:spelling

  dict-check:
    name: CSPELL word lists check
    runs-on: ubuntu-latest
    env:
      FIX_CMD: fix:dict
    steps:
      - uses: actions/checkout@v6
      # Note: FIX_CMD runs fine without setup-node
      - run: npm run ${{ env.FIX_CMD }}
      - name: Any changed files?
        run: |
          CHANGES=`git status --porcelain`
          if [[ $CHANGES ]]; then
            echo "Add comment '/${{ env.FIX_CMD }}' to your PR in GitHub,"
            echo "or locally run 'npm run ${{ env.FIX_CMD }}' and commit the changes:"
            echo "$CHANGES"
            exit 1
          else
            echo "cSpell front-matter ignore lists and .cspell/*.txt word lists are normalized and sorted."
          fi
