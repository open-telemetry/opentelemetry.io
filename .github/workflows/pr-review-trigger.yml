# Purpose:
#   Bridge pull_request_review events to the privileged label updater workflow.
#
# Why this exists:
#   We avoid running label updates directly on pull_request_review.
#   Instead, this workflow records only the PR number (artifact), and
#   PR approval labels (pr-approval-labels.yml) consumes it via workflow_run in a trusted context.
#
# Security model:
#   This workflow is intentionally minimal and does not use privileged secrets.
#   It ignores review.state == "commented" because comments do not affect approvals.
# 
# References:
#   - https://opentelemetry.io/site/build/ci-workflows/#pr-approval-labels
name: PR review trigger

on:
  pull_request_review:
    types:
      - submitted
      - dismissed

jobs:
  save-pr-number:
    name: Save PR number
    runs-on: ubuntu-latest
    if: >-
      github.repository_owner == 'open-telemetry' && github.event.review.state
      != 'commented'
    steps:
      - name: Save PR number
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: echo "$PR_NUMBER" > pr-number.txt
      - uses: actions/upload-artifact@v6
        with:
          name: pr-number
          path: pr-number.txt
          retention-days: 1
