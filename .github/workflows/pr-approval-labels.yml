# To learn more about this workflow, see:
#  https://opentelemetry.io/site/build/ci-workflows/#pr-approval-labels
name: PR approval labels

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
  workflow_run:
    workflows:
      - PR review trigger
    types:
      - completed

permissions:
  contents: read

jobs:
  update-approval-labels:
    name: Update approval labels
    runs-on: ubuntu-latest
    if: >-
      github.repository_owner == 'open-telemetry' && (github.event_name !=
      'workflow_run' || github.event.workflow_run.conclusion == 'success')
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}

      - name: Download PR number artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: pr-number
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Set PR number
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            echo "number=" >> "$GITHUB_OUTPUT"  # unused for scheduled runs
          elif [[ "$EVENT_NAME" == "workflow_run" ]]; then
            if [[ ! -f pr-number.txt ]]; then
              echo "Error: pr-number.txt artifact file not found." >&2
              exit 1
            fi
            PR_NUM="$(tr -d '[:space:]' < pr-number.txt)"
            if [[ -z "$PR_NUM" || ! "$PR_NUM" =~ ^[0-9]+$ ]]; then
              echo "Error: Invalid PR number from artifact: '$PR_NUM'. Expected a non-empty integer." >&2
              exit 1
            fi
            echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
          else
            if [[ -z "$PR_NUMBER" || ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
              echo "Error: Invalid PR number from event: '$PR_NUMBER'. Expected a non-empty integer." >&2
              exit 1
            fi
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_DOCS_APP_ID }}
          private-key: ${{ secrets.OTELBOT_DOCS_PRIVATE_KEY }}

      - name: Update approval labels
        if: github.event_name != 'schedule'
        run: ./.github/scripts/pr-approval-labels.sh
        env:
          # Use the app token to read org team membership
          GITHUB_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}

      - name: Update approval labels (scheduled)
        if: github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          blog_prs=$(gh pr list \
            --repo "${REPO}" \
            --label "blog" \
            --state open \
            --json number \
            --jq '.[].number')
          if [[ -z "${blog_prs}" ]]; then
            echo "No open blog PRs found."
            exit 0
          fi
          echo "Open blog PRs: ${blog_prs}"
          for pr_num in ${blog_prs}; do
            echo "--- Processing PR #${pr_num} ---"
            PR="${pr_num}" ./.github/scripts/pr-approval-labels.sh \
              || echo "WARNING: Failed for PR #${pr_num}"
          done
