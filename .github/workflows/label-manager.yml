# To learn more about this workflow, see:
#  https://opentelemetry.io/site/build/ci-workflows/#pr-approval-labels
name: Label manager

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
  workflow_run:
    workflows:
      - PR review trigger
    types:
      - completed

permissions:
  contents: read

jobs:
  add-component-labels:
    name: Add component labels
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/labeler@v6
        with:
          configuration-path: '.github/component-label-map.yml'

  update-approval-labels:
    name: Update approval labels
    runs-on: ubuntu-latest
    concurrency:
      group:
        pr-approval-${{ github.event.pull_request.number ||
        github.event.workflow_run.pull_requests[0].number || github.run_id }}
      cancel-in-progress: true
    if: >-
      github.repository_owner == 'open-telemetry' && (github.event_name !=
      'workflow_run' || github.event.workflow_run.conclusion == 'success')
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}

      - name: Download PR number artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: pr-number
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Set PR number
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            if [[ ! -f pr-number.txt ]]; then
              echo "Error: pr-number.txt artifact file not found." >&2
              exit 1
            fi
            PR_NUM="$(tr -d '[:space:]' < pr-number.txt)"
            if [[ -z "$PR_NUM" || ! "$PR_NUM" =~ ^[0-9]+$ ]]; then
              echo "Error: Invalid PR number from artifact: '$PR_NUM'. Expected a non-empty integer." >&2
              exit 1
            fi
            echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
          else
            if [[ -z "$PR_NUMBER" || ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
              echo "Error: Invalid PR number from event: '$PR_NUMBER'. Expected a non-empty integer." >&2
              exit 1
            fi
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_DOCS_APP_ID }}
          private-key: ${{ secrets.OTELBOT_DOCS_PRIVATE_KEY }}

      - name: Update approval labels
        continue-on-error: true
        run: ./.github/scripts/pr-approval-labels.sh
        env:
          # Use the app token to read org team membership
          GITHUB_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
          PUBLISH_DATE_LABELS: blog
