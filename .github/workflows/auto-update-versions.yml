name: Auto-update versions

on:
  workflow_dispatch:
  schedule:
    # hourly at minute 10
    - cron: 10 * * * *

permissions: read-all

jobs:
  auto-update:
    name: Auto-update versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.repository == 'open-telemetry/opentelemetry.io'
    env:
      DEPTH: --depth 999 # submodule clone depth

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      # Don't --ignore-scripts: code-excerpter needs submodules
      - run: npm install --omit=optional

      - name: Use CLA approved github bot
        run: |
          git config user.name otelbot
          git config user.email 197425009+otelbot@users.noreply.github.com

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: otelbot-token
        with:
          client-id: ${{ vars.OTELBOT_CLIENT_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - run: ./scripts/auto-update/all-versions.sh
        env:
          # change to ${{ secrets.GITHUB_TOKEN }} and comment out the step above when testing against a fork
          GH_TOKEN: ${{ steps.otelbot-token.outputs.token }}

  report-failure:
    needs: auto-update
    if: failure() && github.repository == 'open-telemetry/opentelemetry.io'
    uses: ./.github/workflows/reusable-report-failure.yml
    permissions:
      issues: write # Pass through for failure tracking issues
      contents: read
