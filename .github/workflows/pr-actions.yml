name: PR actions

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

env:
  COMMENT: ${{ github.event.comment.body }}
  PR_NUM: ${{ github.event.issue.number }}
  MAX_PATCH_SIZE_KB: 1024

jobs:
  generate-patch:
    name: Run PR action and generate patch (untrusted)
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/fix')

    outputs:
      action_name: ${{ steps.extract.outputs.action_name }}
      action_exit_status: ${{ steps.patch.outputs.action_exit_status }}
      patch_name: pr-fix-${{ github.run_id }}
      patch_skipped: ${{ steps.patch.outputs.patch_skipped }}

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 0, persist-credentials: false }

      - name: Extract action name and resolve command
        id: extract
        # Parses the `/fix` directive and applies the `fix:all`/`fix:ALL` compat
        # mapping. We don't have permissions in this job to comment on the PR, so
        # an invalid directive just fails the step.
        run: node scripts/gh/pr-fix/cli.mjs

      - run: gh pr checkout $PR_NUM -b "pr-action-${RANDOM}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run PR action and generate patch
        id: patch
        # Untrusted: runs the resolved npm script and captures any changes as a
        # patch artifact. Has no write permissions or secrets. The `_refcache:prune`
        # post-command drops 404 entries so refcache updates stay clean.
        uses: ./.github/actions/npm-script-patch
        with:
          command: ${{ steps.extract.outputs.command }}
          patch-name: pr-fix-${{ github.run_id }}
          max-patch-size-kb: ${{ env.MAX_PATCH_SIZE_KB }}
          post-command: _refcache:prune

  apply-patch:
    name: Apply and push patch (trusted)
    needs: generate-patch
    if: needs.generate-patch.outputs.patch_skipped == 'false'
    # A reusable workflow (resolved from the default branch, never from the PR)
    # so that no PR-controlled code can run with write credentials.
    uses: ./.github/workflows/reusable-apply-patch.yml
    permissions:
      contents: write # push the applied patch to the PR branch
      pull-requests: write # gh pr checkout
    with:
      pr-number: ${{ github.event.issue.number }}
      patch-name: ${{ needs.generate-patch.outputs.patch_name }}
      commit-message: Results from /fix directive
      user-name: otelbot
      user-email: 197425009+otelbot@users.noreply.github.com
      # the higher privileged docs app is needed to push commits to an existing PR
      app-id: ${{ vars.OTELBOT_DOCS_APP_ID }}
    secrets:
      app-private-key: ${{ secrets.OTELBOT_DOCS_PRIVATE_KEY }}

  report:
    name: Report outcome (trusted)
    runs-on: ubuntu-latest
    needs: [generate-patch, apply-patch]
    # Always tell the requestor what happened, including when patch generation
    # failed before anything could be applied. Only skip when there was no /fix
    # invocation to report on.
    if: always() && needs.generate-patch.result != 'skipped'
    permissions:
      pull-requests: write # comment the run outcome on the PR

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 1, persist-credentials: false }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: otelbot-token
        with:
          client-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Comment run outcome
        env:
          GH_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          PR_NUM: ${{ env.PR_NUM }}
          LABEL: ${{ needs.generate-patch.outputs.action_name }}
          GENERATE_RESULT: ${{ needs.generate-patch.result }}
          PATCH_SKIPPED: ${{ needs.generate-patch.outputs.patch_skipped }}
          COMMAND_EXIT_STATUS:
            ${{ needs.generate-patch.outputs.action_exit_status }}
          APPLY_RESULT: ${{ needs.apply-patch.result }}
          HINT: Use `/fix` or `/fix:<name>` and no other text.
        run: node scripts/gh/patch-report/cli.mjs
