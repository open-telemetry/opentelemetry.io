name: PR actions

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

env:
  COMMENT: ${{ github.event.comment.body }}
  PR_NUM: ${{ github.event.issue.number }}
  MAX_PATCH_SIZE_KB: 1024

# Latest directive wins: a new /fix comment on a PR cancels that PR's
# in-flight run (the cancelled run's report job still posts a ⚠️ outcome).
# Non-/fix comments trigger this workflow too (all jobs skip), so they get a
# unique group to keep them from cancelling a /fix run.
concurrency:
  group:
    ${{ github.workflow }}-${{ startsWith(github.event.comment.body, '/fix') &&
    github.event.issue.number || github.run_id }}
  cancel-in-progress: ${{ startsWith(github.event.comment.body, '/fix') }}

jobs:
  ack:
    name: Acknowledge request (trusted)
    runs-on: ubuntu-latest
    # Same broad /fix PR-comment gate as generate-patch, including the open-PR
    # check; closed PRs skip the ack and get a fresh outcome comment from the
    # report job. The report job updates the ack comment in place with the
    # outcome.
    if: |
      github.event.issue.pull_request &&
      github.event.issue.state == 'open' &&
      startsWith(github.event.comment.body, '/fix')
    permissions:
      contents: read # checkout
    outputs:
      comment_id: ${{ steps.ack.outputs.comment_id }}

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 1, persist-credentials: false }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: otelbot-token
        with:
          client-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}
          # PR comments authorize via the pull-requests permission (even
          # though they're posted through the issues API endpoint).
          permission-pull-requests: write # post the acknowledgement comment

      - name: Post acknowledgement comment
        id: ack
        env:
          GH_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          DIRECTIVE_URL: ${{ github.event.comment.html_url }}
        run: |
          node scripts/gh/patch-report/cli.mjs --ack \
            --pr "$PR_NUM" \
            --directive-url "$DIRECTIVE_URL"

  generate-patch:
    name: Run PR action and generate patch (untrusted)
    runs-on: ubuntu-latest
    # Broad prefix gate; exact (first-line) parsing happens in the extract
    # step below. Closed (including merged) PRs are gated out here; the report
    # job still explains why nothing ran.
    if: |
      github.event.issue.pull_request &&
      github.event.issue.state == 'open' &&
      startsWith(github.event.comment.body, '/fix')

    # These outputs are produced by the untrusted job (PR-supplied code can
    # influence or even forge them), so they must never gate anything
    # security-relevant. Here they only decide whether the apply job runs and
    # what the outcome comment says.
    outputs:
      action_name: ${{ steps.extract.outputs.action_name }}
      action_exit_status: ${{ steps.patch.outputs.action_exit_status }}
      patch_name: pr-fix-${{ github.run_id }}
      patch_skipped: ${{ steps.patch.outputs.patch_skipped }}

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 0, persist-credentials: false }

      - name: Extract action name and resolve command
        id: extract
        # Parses the `/fix` directive (first line of the comment only) and
        # applies the `fix:all`/`fix:ALL` compat mapping. An invalid directive
        # fails this step; the `report` job then comments the outcome (with a
        # usage hint) on the PR.
        run: node scripts/gh/pr-fix/cli.mjs --comment "$COMMENT"

      - run: gh pr checkout $PR_NUM -b "pr-action-${RANDOM}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run PR action and generate patch
        id: patch
        # Untrusted: runs the resolved npm script and captures any changes as a
        # patch artifact. Has no write permissions or secrets. The `_refcache:prune`
        # post-command drops 404 entries so refcache updates stay clean.
        uses: ./.github/actions/npm-script-patch
        with:
          command: ${{ steps.extract.outputs.command }}
          patch-name: pr-fix-${{ github.run_id }}
          max-patch-size-kb: ${{ env.MAX_PATCH_SIZE_KB }}
          post-command: _refcache:prune

  apply-patch:
    name: Apply and push patch (trusted)
    needs: generate-patch
    if: needs.generate-patch.outputs.patch_skipped == 'false'
    # A reusable workflow (resolved from the default branch, never from the PR)
    # so that no PR-controlled code can run with write credentials.
    uses: ./.github/workflows/reusable-apply-patch.yml
    # GITHUB_TOKEN grants forwarded to the reusable workflow (its jobs cannot
    # exceed these); see that workflow for how its steps authenticate.
    permissions:
      contents: write # push the applied patch to the PR branch
      pull-requests: write # may be trimmable; steps authenticate with the app token
    with:
      pr-number: ${{ github.event.issue.number }}
      patch-name: ${{ needs.generate-patch.outputs.patch_name }}
      commit-message: Results from /fix directive
      user-name: otelbot
      user-email: 197425009+otelbot@users.noreply.github.com
      # the higher privileged docs app is needed to push commits to an existing PR
      app-id: ${{ vars.OTELBOT_DOCS_APP_ID }}
    secrets:
      app-private-key: ${{ secrets.OTELBOT_DOCS_PRIVATE_KEY }}

  report:
    name: Report outcome (trusted)
    runs-on: ubuntu-latest
    needs: [ack, generate-patch, apply-patch]
    # Always tell the requestor what happened, for every comment that enters
    # the pipeline (same broad gate as generate-patch, minus the PR-state
    # check): invalid directives, failures, and directives on closed PRs.
    if: |
      always() &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/fix')
    # The outcome comment is posted with the app token below, not GITHUB_TOKEN.
    permissions:
      contents: read # checkout

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 1, persist-credentials: false }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: otelbot-token
        with:
          client-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}
          # PR comments authorize via the pull-requests permission (even
          # though they're posted through the issues API endpoint). The
          # otelbot installation has no issues permission; requesting it
          # makes the token mint fail (422).
          permission-pull-requests: write # comment the run outcome on the PR

      - name: Comment run outcome
        env:
          GH_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          LABEL: ${{ needs.generate-patch.outputs.action_name }}
          # Updates the ack comment in place when one was posted; otherwise
          # (e.g. directive on a closed PR, the ack job failed, or the run
          # was cancelled before the ack posted its comment id) the outcome
          # is posted as a new comment — in the cancelled case a stale 🔄
          # comment may remain.
          ACK_COMMENT_ID: ${{ needs.ack.outputs.comment_id }}
          DIRECTIVE_URL: ${{ github.event.comment.html_url }}
          # 'open' or 'closed'; merged PRs are 'closed' with a merged_at time.
          PR_STATE: ${{ github.event.issue.state }}
          PR_MERGED: ${{ github.event.issue.pull_request.merged_at != null }}
          GENERATE_RESULT: ${{ needs.generate-patch.result }}
          PATCH_SKIPPED: ${{ needs.generate-patch.outputs.patch_skipped }}
          COMMAND_EXIT_STATUS:
            ${{ needs.generate-patch.outputs.action_exit_status }}
          APPLY_RESULT: ${{ needs.apply-patch.result }}
        # The hint is owned by the directive parser (single source of truth
        # with its invalid-directive message); this checkout is of the default
        # branch, so the imported text is trusted.
        run: |
          hint=$(node -e 'import("./scripts/gh/pr-fix/index.mjs").then((m) => console.log(m.DIRECTIVE_HINT))')
          node scripts/gh/patch-report/cli.mjs \
            --pr "$PR_NUM" \
            --comment-id "$ACK_COMMENT_ID" \
            --directive-url "$DIRECTIVE_URL" \
            --label "$LABEL" \
            --pr-state "$PR_STATE" \
            --pr-merged "$PR_MERGED" \
            --generate-result "$GENERATE_RESULT" \
            --patch-skipped "$PATCH_SKIPPED" \
            --command-exit-status "$COMMAND_EXIT_STATUS" \
            --apply-result "$APPLY_RESULT" \
            --hint "$hint"
