name: Housekeeping

# Scheduled housekeeping: runs an approved fix command (default
# `fix-and-test:all`: all fixes then all checks, with links checked exactly
# once via fix:refcache) and publishes any resulting changes as a PR. The
# second caller of the reusable patch actions (after `pr-actions.yml`), and
# the scheduled-maintenance flow that motivated
# https://github.com/open-telemetry/opentelemetry.io/issues/6592.
#
# The results land on the stable `otelbot/housekeeping` branch, recreated
# from `main` on every run: there is at most one open housekeeping PR at a
# time, and a new run force-pushes the latest results to it. When a run
# produces no changes, the publish job is skipped and any open housekeeping
# PR is left as is.

on:
  schedule:
    - cron: '37 21 * * *' # daily at 21:37 UTC, ~12h after refcache-refresh and the other daily jobs
  workflow_dispatch:
    inputs:
      command:
        # Dispatch requires write access to the repository, so this input is
        # maintainer-only; intended for approved fix scripts.
        description: The npm script to run.
        default: fix-and-test:all
        type: string

permissions:
  contents: read

env:
  MAX_PATCH_SIZE_KB: 1024

# At most one housekeeping run at a time; let an in-flight run finish rather
# than cancelling it (runs are idempotent, so the next one catches up).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  generate-patch:
    name: Run housekeeping command and generate patch
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run in the canonical repository; forks lack the bot app
    # variables and secrets that the publish job needs.
    if: github.repository == 'open-telemetry/opentelemetry.io'
    permissions:
      contents: read
    outputs:
      patch_name: housekeeping-${{ github.run_id }}
      patch_skipped: ${{ steps.patch.outputs.patch_skipped }}
      command_exit_status: ${{ steps.patch.outputs.action_exit_status }}

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: the i18n fix/check scripts that the default command
          # runs diff localized pages against their `default_lang_commit`.
          fetch-depth: 0
          persist-credentials: false

      # Needed by the check:collector-sync scripts that the default command
      # runs; uv resolves the Python toolchain and project deps on first use.
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Run housekeeping command and generate patch
        id: patch
        # Default-branch only (trusted; cf. pr-actions). Non-zero exit is OK—
        # fixes still publish; residual failures fail in report-failure below.
        uses: ./.github/actions/npm-script-patch
        env:
          # Authenticated github.com link checks (rate limits) in fix:refcache;
          # step-level env reaches the composite action's steps.
          GITHUB_TOKEN: ${{ github.token }}
        with:
          command: ${{ inputs.command || 'fix-and-test:all' }}
          patch-name: housekeeping-${{ github.run_id }}
          max-patch-size-kb: ${{ env.MAX_PATCH_SIZE_KB }}

      - name: Fail on command failure
        if: steps.patch.outputs.action_exit_status != '0'
        env:
          EXIT_STATUS: ${{ steps.patch.outputs.action_exit_status }}
        run: |
          echo "Housekeeping command failed with exit status $EXIT_STATUS." \
            "Any fixes it produced are still published as a PR."
          exit 1

  publish-patch:
    name: Publish patch as PR
    needs: generate-patch
    # Publish whatever fixes were captured, even when the command itself
    # failed (always() lets this run despite the failed gate step above).
    if: always() && needs.generate-patch.outputs.patch_skipped == 'false'
    uses: ./.github/workflows/reusable-patch-pr.yml
    permissions:
      contents: write # push the patch branch
      pull-requests: write # create the PR
    with:
      patch-name: ${{ needs.generate-patch.outputs.patch_name }}
      branch: otelbot/housekeeping
      pr-title: 'Housekeeping: automated fix results'
      pr-body: >-
        Automated fix results from the scheduled
        [housekeeping](https://opentelemetry.io/site/build/ci-workflows/#housekeeping)
        workflow.${{ needs.generate-patch.outputs.command_exit_status != '0' &&
        ' ⚠️ The housekeeping command itself failed, so these results may be
        partial; for details, see the run logs (and the failure-report issue,
        once filed).' || '' }}
      pr-body-footer: /cc @chalin @vitorvasc
      commit-message: Housekeeping fix results
      user-name: otelbot
      user-email: 197425009+otelbot@users.noreply.github.com
      # the higher privileged docs app is needed to push branches and open PRs
      client-id: ${{ vars.OTELBOT_DOCS_CLIENT_ID }}
    secrets:
      app-private-key: ${{ secrets.OTELBOT_DOCS_PRIVATE_KEY }}

  report-failure:
    name: Report failure
    needs: [generate-patch, publish-patch]
    if: failure() && github.repository == 'open-telemetry/opentelemetry.io'
    uses: ./.github/workflows/reusable-report-failure.yml
    permissions:
      issues: write # Pass through for failure tracking issues
      contents: read
    with:
      issue-prefix: Housekeeping workflow failed
      # Link back to the housekeeping PR ('' when no fixes were published).
      # GitHub's automatic cross-referencing surfaces this mention in the PR
      # timeline, so no PR → issue link is needed.
      pr-url: ${{ needs.publish-patch.outputs.pr-url }}
