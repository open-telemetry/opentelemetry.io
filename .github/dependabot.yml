version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: hugo-extended
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Website scripts
  - package-ecosystem: npm
    directory: /scripts/generate-community-data
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /scripts/registry-scanner
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /scripts/ai-content-detection
    schedule:
      interval: weekly
