name: apply-patch
description: >-
  Apply a patch artifact and commit the result. Pushing or opening a PR is left
  to the caller.

  This action is trusted in the sense that it is meant to run in a job that
  holds write credentials, and it never executes caller- or patch-supplied code
  (it only runs `git apply`, `git commit`, and related plumbing).

inputs:
  patch-name:
    description: Name of the patch artifact to apply.
    required: true
  commit-message:
    description: Commit message to use when there are changes to commit.
    required: false
    default: Apply patch
  user-name:
    description: Git user name for the commit.
    required: true
  user-email:
    description: Git user email for the commit.
    required: true

outputs:
  committed:
    description: Whether a commit was created ('true' or 'false').
    value: ${{ steps.commit.outputs.committed }}

runs:
  using: composite
  steps:
    - name: Download patch
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.patch-name }}

    - name: Apply patch
      shell: bash
      run: |
        if ! git apply --verbose site.patch; then
          echo "Patch failed to apply. For details, see output above. To debug this locally,"
          echo "get the patch file from the workflow summary artifact section."
          exit 1
        fi
        rm site.patch

    - name: Commit changes, if any
      id: commit
      shell: bash
      env:
        USER_NAME: ${{ inputs.user-name }}
        USER_EMAIL: ${{ inputs.user-email }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
      run: |
        git config --local user.email "$USER_EMAIL"
        git config --local user.name "$USER_NAME"
        if [[ $(git status --porcelain) ]]; then
          git add -A
          git commit -m "$COMMIT_MESSAGE"
          echo "committed=true" >> "$GITHUB_OUTPUT"
        else
          echo "No changes to commit"
          echo "committed=false" >> "$GITHUB_OUTPUT"
        fi
