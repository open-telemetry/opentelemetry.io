# Expected membership of the docs-<locale> GitHub teams. This registry is the
# data source for the generated locale section of .github/CODEOWNERS -- see
# scripts/gh/locale-codeowners/README.md. Regenerate via:
#
#   npm run fix:codeowners
#
# cSpell:disable
#
# Membership changes require a PR against this file (audit trail), applied to
# the live teams by an org admin. Notes:
#
# - `maintainers` and `approvers` list *direct* members of the corresponding
#   `docs-<locale>-maintainers` / `-approvers` teams. GitHub also reports
#   child-team (maintainers) members as part of the parent (approvers) team.
# - A locale with no maintainers is considered unstaffed: its CODEOWNERS
#   lines additionally list @open-telemetry/docs-approvers as a fallback.
#   See https://github.com/open-telemetry/opentelemetry.io/issues/10374.

