description:
  AgentMark is an OpenTelemetry-native SDK for building and observing AI agents.
  It instruments the Vercel AI SDK, Mastra, the Claude Agent SDK, and Pydantic
  AI, emitting gen_ai.* spans for inference, tool calls, and streaming and
  exporting them over OTLP to any OpenTelemetry-compatible backend. It also
  ingests and normalizes OpenInference and OpenLLMetry spans, bringing traces
  from frameworks like LangChain and LlamaIndex into the same gen_ai.* model.
