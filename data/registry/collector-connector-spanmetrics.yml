license: Apache 2.0
description: >-
  Converts distributed trace span data into RED (Request, Error, Duration)
  metrics. Generates call counts, error rates, and duration histograms
  aggregated by service name, span name, span kind, and status code, with
  support for customizable dimensions, exponential histograms, exemplars, and
  both cumulative and delta aggregation temporality.
