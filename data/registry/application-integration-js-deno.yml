description:
  Deno has built-in OpenTelemetry support for traces, metrics, and logs.
  Enabled via the OTEL_DENO=true environment variable, it automatically
  instruments HTTP servers (Deno.serve) and outgoing fetch requests, exports
  telemetry over OTLP, and supports custom instrumentation via the
  @opentelemetry/api npm package.
