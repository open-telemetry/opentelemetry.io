description:
  DProvenanceKit records on-device AI agent runs as queryable, diffable traces
  for reasoning observability and regression testing. Its DProvenanceOTel module
  is a dependency-free bridge that maps each trace run to an OTLP/JSON document
  (one root span per run, child spans per step, span events per trace event) and
  promotes Apple FoundationModels calls to gen_ai.* semantic-convention
  attributes, exporting to Langfuse or any OTLP/HTTP collector.
